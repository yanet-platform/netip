name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "book/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "book/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      # The MSRV is a promise about the library, so this checks `--lib` only:
      # tests and benches pull in dev-dependencies, which track their own,
      # newer minimum toolchain. Keep the pinned version in sync with
      # `rust-version` in `Cargo.toml`.
      - run: cargo check --lib --locked

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  no-std:
    name: no_std
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      # `thumbv7em-none-eabihf` has no `std` and a 32-bit `usize`, so this one
      # job guards both properties. It must be `build`, not `check`: the
      # `arithmetic_overflow` lint runs during codegen, and `check` skips
      # codegen — a shift that overflows a 32-bit `usize` passes `check` clean.
      - run: cargo build --lib --target thumbv7em-none-eabihf
